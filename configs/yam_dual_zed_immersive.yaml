  # --------------------------------------------------------------------------
  # Neck — standalone XLERobot pan/tilt driven by HMD pose
  # --------------------------------------------------------------------------
  - name: "YAM Neck"
    namespace: "yam_neck"
    serial: "YAM_NECK"

    adapters:
      - id: "neck"
        plugin: "sentinel_adapter_xlerobot_neck::XLERobotNeckAdapter"
        publish_rate_hz: 30.0

        neck:
          port: "<NECK_SERIAL_PORT>"  # e.g. "/dev/ttyACM0"
          baudrate: 1000000
          motor_model: "sts3215"
          yaw_id: 2
          pitch_id: 1
          calibration_file: "/config/neck_calibration.json"
          disable_torque_on_disconnect: true

    capabilities:
      - type: pose_neck
        id: neck
        adapter_id: "neck"
        enabled: true

        invert_yaw: true
        invert_pitch: true
        command_rate_hz: 30.0

        smoothing_enabled: true
        smoothing_alpha: 0.5

    state_machine:
      initial_state: "DISARMED"
      joint_names: []
      home_positions: []
      start_positions: []
      motion:
        action_server_wait_timeout: 5.0
        goal_acceptance_timeout: 2.0
        motion_duration: 1.0
      calibration_timeout_s: 10.0

    orchestration:
      on_arm:
        - node: "robot_adapter_"
          transition: "configure"
          timeout: 10.0
        - node: "neck_retargeter_"
          transition: "configure"
          timeout: 10.0
        - node: "robot_adapter_"
          transition: "activate"
          timeout: 10.0
        - node: "neck_retargeter_"
          transition: "activate"
          timeout: 5.0

      on_start_teleop: []
      on_stop_teleop: []
